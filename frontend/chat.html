<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InovaHub - Chat</title>
    <style>
      body { font-family: Arial, sans-serif; background:#0f172a; color:#e5e7eb; margin:0; }
      .container { max-width:900px; margin:40px auto; padding:20px; background:#111827; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,.4); }
      h1 { margin-top:0; }
      .btn { background:#22c55e; border:none; color:#022c22; padding:10px 16px; border-radius:8px; cursor:pointer; margin:6px 4px; font-weight:bold; }
      .btn:hover { background:#16a34a; }
      .link { color:#60a5fa; cursor:pointer; margin-right:12px; text-decoration:underline; }
      .nav { margin-bottom:18px; }
      .card { background:#020617; padding:12px; border-radius:10px; margin:10px 0; border:1px solid #1e293b; }
      .input { padding:10px; border-radius:8px; border:1px solid #334155; background:#020617; color:#e5e7eb; width:100%; box-sizing:border-box; }
      .small { opacity:.8; font-size:12px; }
      .erro { background:#7f1d1d; padding:10px; border-radius:8px; margin-top:10px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <span class="link" onclick="go('/dashboard.html')">Dashboard</span>
        <span class="link" onclick="go('/chat.html')">Chat</span>
        <span class="link" onclick="go('/ranking.html')">Ranking</span>
      </div>
      <h1>Assistente de inovação</h1>
      <p class="small">Esta tela chama a rota <b>POST /api/chat</b> do backend.</p>
      <div id="chatbox" class="card"></div>
      <input id="msg" class="input" placeholder="Pergunte algo. Ex.: Como participar?" onkeydown="if(event.key==='Enter') send()" /><br /><br />
      <button class="btn" onclick="send()">Enviar</button>
      <div id="feedback"></div>
    </div>
    <script>
      const API_URL = window.location.origin;
      function go(p) { window.location.href = p; }
      function addMessage(label, text) {
        const box = document.getElementById('chatbox');
        const p = document.createElement('p');
        p.innerHTML = `<b>${label}:</b> ${text}`;
        box.appendChild(p);
      }
      async function send() {
        const input = document.getElementById('msg');
        const message = input.value.trim();
        const feedback = document.getElementById('feedback');
        feedback.innerHTML = '';
        if (!message) return;
        addMessage('Você', message);
        input.value = '';
        try {
          const res = await fetch(`${API_URL}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
          });
          const dados = await res.json();
          if (!res.ok) throw new Error(dados.error || 'Erro no chat.');
          addMessage('IA', dados.answer);
        } catch (erro) {
          feedback.innerHTML = `<div class="erro">${erro.message}</div>`;
        }
      }
    </script>
  </body>
</html>
